name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (fail on high+)
        run: npm audit --audit-level=high

      - name: Run tests
        run: npx jest --coverage --forceExit

      - name: Server boots cleanly
        run: |
          timeout 15 node -e "
            require('./server.js');
            setTimeout(() => { console.log('boot OK'); process.exit(0); }, 5000);
          "
