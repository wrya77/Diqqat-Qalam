<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول — دقة قلم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#07090f;--bg2:#161b22;--border:#21262d;
      --accent:#2f81f7;--accent-h:#58a6ff;--green:#3fb950;
      --text:#e6edf3;--text2:#b1bac4;--text3:#8b949e;--red:#f85149;
    }
    body{
      background:var(--bg);color:var(--text);
      font-family:'Tajawal',system-ui,sans-serif;
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:
        radial-gradient(ellipse 70% 50% at 50% 0%,rgba(47,129,247,.12),transparent),
        var(--bg);
    }
    .auth-wrap{
      width:100%;max-width:420px;
      padding:20px;
    }
    .auth-logo{
      text-align:center;margin-bottom:36px;
    }
    .auth-logo .icon{
      font-size:48px;margin-bottom:10px;display:block;
    }
    .auth-logo h1{
      font-size:28px;font-weight:900;letter-spacing:-1px;
    }
    .auth-logo span{color:var(--accent-h)}
    .auth-logo p{font-size:14px;color:var(--text3);margin-top:6px}

    .auth-card{
      background:var(--bg2);
      border:1px solid var(--border);
      border-radius:16px;
      padding:32px;
    }
    .auth-card h2{
      font-size:20px;font-weight:700;
      margin-bottom:6px;text-align:center;
    }
    .auth-card p{
      font-size:14px;color:var(--text3);
      text-align:center;margin-bottom:28px;
    }

    .btn-google{
      width:100%;display:flex;align-items:center;justify-content:center;
      gap:12px;padding:14px 20px;
      background:#fff;color:#1a1a1a;
      border:none;border-radius:10px;
      font-size:15px;font-weight:700;
      font-family:inherit;cursor:pointer;
      transition:.15s;
    }
    .btn-google:hover{background:#f0f0f0;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
    .btn-google:active{transform:none}
    .btn-google img{width:22px;height:22px;flex-shrink:0}

    .divider{
      display:flex;align-items:center;gap:12px;
      margin:20px 0;color:var(--text3);font-size:12px;
    }
    .divider::before,.divider::after{
      content:'';flex:1;height:1px;background:var(--border);
    }

    .auth-footer{
      text-align:center;margin-top:24px;
      font-size:13px;color:var(--text3);
    }
    .auth-footer a{color:var(--accent-h);text-decoration:none}
    .auth-footer a:hover{text-decoration:underline}

    .features-mini{
      display:grid;grid-template-columns:1fr 1fr;
      gap:8px;margin-top:20px;
    }
    .fm{
      display:flex;gap:8px;align-items:center;
      font-size:13px;color:var(--text3);
    }
    .fm span:first-child{font-size:16px}

    .error-msg{
      background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);
      color:var(--red);border-radius:8px;padding:10px 14px;
      font-size:13px;margin-bottom:16px;display:none;
    }
    .loading{
      width:20px;height:20px;border:2px solid rgba(0,0,0,.2);
      border-top-color:#333;border-radius:50%;
      animation:spin .7s linear infinite;display:none;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    .success-state{
      text-align:center;padding:20px 0;display:none;
    }
    .success-state .check{font-size:48px;margin-bottom:12px}
    .success-state p{color:var(--green);font-size:15px}

    .no-auth-note{
      background:rgba(47,129,247,.08);border:1px solid rgba(47,129,247,.2);
      border-radius:8px;padding:12px 16px;
      font-size:13px;color:var(--text2);margin-top:16px;
      text-align:center;
    }
  </style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-logo">
    <span class="icon">✏</span>
    <h1>دقة<span>قلم</span></h1>
    <p>Diqqat Qalam — مولّد G-Code الاحترافي</p>
  </div>

  <div class="auth-card">
    <h2>مرحباً بك</h2>
    <p>سجّل الدخول للوصول إلى جميع الأدوات</p>

    <div class="error-msg" id="error-msg"></div>

    <div id="login-form">
      <button class="btn-google" id="btn-google" onclick="signInWithGoogle()">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%23EA4335' d='M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z'/%3E%3Cpath fill='%234285F4' d='M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z'/%3E%3Cpath fill='%23FBBC05' d='M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z'/%3E%3Cpath fill='%2334A853' d='M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z'/%3E%3C/svg%3E" alt="Google">
        <span id="google-btn-text">تسجيل الدخول بـ Google</span>
        <div class="loading" id="google-loading"></div>
      </button>

      <div id="no-auth-fallback" class="no-auth-note" style="display:none">
        ⚠️ لم يتم تهيئة Supabase بعد.<br>
        <a href="/app" style="color:var(--accent-h)">الدخول بدون تسجيل (وضع محلي)</a>
      </div>
    </div>

    <div class="success-state" id="success-state">
      <div class="check">✅</div>
      <p>تم تسجيل الدخول بنجاح!<br>جاري التوجيه...</p>
    </div>

    <div class="divider">الميزات المتاحة</div>
    <div class="features-mini">
      <div class="fm"><span>✏️</span><span>أدوات رسم</span></div>
      <div class="fm"><span>⚡</span><span>توليد G-Code</span></div>
      <div class="fm"><span>🖥</span><span>تحكم بالآلة</span></div>
      <div class="fm"><span>🤖</span><span>تحسين AI</span></div>
    </div>
  </div>

  <div class="auth-footer">
    <a href="/">← العودة للرئيسية</a>
  </div>
</div>

<script>
let _supabase = null;

async function initSupabase() {
  try {
    const res = await fetch('/api/config');
    const cfg = await res.json();
    if (!cfg.supabaseUrl || !cfg.supabaseKey) {
      document.getElementById('no-auth-fallback').style.display = 'block';
      return null;
    }
    _supabase = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseKey);
    return _supabase;
  } catch (e) {
    document.getElementById('no-auth-fallback').style.display = 'block';
    return null;
  }
}

async function signInWithGoogle() {
  const client = _supabase || await initSupabase();
  if (!client) { window.location.href = '/app'; return; }

  const btn  = document.getElementById('btn-google');
  const txt  = document.getElementById('google-btn-text');
  const spin = document.getElementById('google-loading');
  btn.disabled = true; txt.textContent = 'جاري التوجيه...'; spin.style.display = 'block';

  const { error } = await client.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/app' }
  });
  if (error) {
    showError('فشل تسجيل الدخول: ' + error.message);
    btn.disabled = false; txt.textContent = 'تسجيل الدخول بـ Google'; spin.style.display = 'none';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}

async function checkExistingSession() {
  const client = await initSupabase();
  if (!client) return;
  const { data: { session } } = await client.auth.getSession();
  if (session) {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('success-state').style.display = 'block';
    setTimeout(() => window.location.href = '/app', 1000);
  }
}

checkExistingSession();
</script>
</body>
</html>
